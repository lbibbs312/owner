name: Build Android app (TWA)

# Manual trigger only — does not run on push.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Point Bubblewrap at the runner's JDK + Android SDK
        run: |
          mkdir -p "$HOME/.bubblewrap"
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_HOME" > "$HOME/.bubblewrap/config.json"
          cat "$HOME/.bubblewrap/config.json"

      - name: Restore or create signing key
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > android.keystore
            echo "Using existing keystore from secret."
          else
            keytool -genkeypair -v -keystore android.keystore -alias movedefense \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=MoveDefense Admin, O=MoveDefense, OU=Engineering, C=US"
            echo "Generated a NEW keystore — download the artifact and keep it safe."
          fi

      - name: Build signed .aab + .apk
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          # Auto-answer Bubblewrap's "regenerate project?" prompt (passwords come from env).
          yes | bubblewrap build --skipPwaValidation

      - name: Generate Digital Asset Links (assetlinks.json)
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          FP=$(keytool -list -v -keystore android.keystore -alias movedefense -storepass "$KS_PASS" \
               | grep -i 'SHA256:' | head -1 | sed 's/.*SHA256: //' | tr -d ' ')
          echo "App signing SHA-256: $FP"
          printf '[{"relation":["delegate_permission/common.handle_all_urls"],"target":{"namespace":"android_app","package_name":"com.movedefense.app","sha256_cert_fingerprints":["%s"]}}]\n' "$FP" > assetlinks.json
          cat assetlinks.json

      - name: Upload package + key + assetlinks
        uses: actions/upload-artifact@v4
        with:
          name: movedefense-android
          path: |
            ./*.aab
            ./*.apk
            android.keystore
            assetlinks.json
          if-no-files-found: warn
