{#
  MoveDefense header for standalone driver pages (no base.html chrome).
  Mirrors the dark topbar look of the mobile shell.
#}
<header class="md-standalone-topbar">
  <a class="md-standalone-brand" href="{% if current_user.is_authenticated and current_user.role != 'management' %}{{ url_for('driver.mobile_dashboard') }}{% else %}{{ url_for('public.welcome') }}{% endif %}">{% include 'partials/_md_logo.html' %}MoveDefense</a>
  {% if current_user.is_authenticated %}
    <div class="md-standalone-actions">
      {% if current_user.role != 'management' %}
        <a class="md-icon-button" href="{{ url_for('messaging.recent_activity') }}" aria-label="Recent activity">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path>
            <path d="M13.7 21a2 2 0 0 1-3.4 0"></path>
          </svg>
          <span class="activityBellBadge position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
        </a>
      {% endif %}
      <a class="md-logout" href="{{ url_for('auth.logout') }}">Logout</a>
    </div>
  {% endif %}
</header>
