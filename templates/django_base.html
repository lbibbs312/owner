<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MoveDefense{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #152028;
      --muted: #60707d;
      --line: #d8e0e6;
      --panel: #ffffff;
      --bg: #f5f8fa;
      --primary: #0f766e;
      --primary-strong: #0b5d56;
      --accent: #c2410c;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }

    a { color: inherit; }

    .site-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
    }

    .topbar-inner,
    .page,
    .footer-inner {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar-inner {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      font-weight: 800;
      letter-spacing: 0;
      text-decoration: none;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .nav a {
      text-decoration: none;
      white-space: nowrap;
    }

    .nav a:hover { color: var(--ink); }

    main { flex: 1; }

    .page {
      padding: 48px 0;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.8fr);
      gap: 28px;
      align-items: start;
      padding: 32px 0 42px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      max-width: 780px;
      margin-bottom: 18px;
      font-size: clamp(2.15rem, 7vw, 4.35rem);
      line-height: 0.98;
      letter-spacing: 0;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 1.6rem;
      line-height: 1.15;
      letter-spacing: 0;
    }

    h3 {
      margin-bottom: 8px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .lede {
      max-width: 720px;
      color: var(--muted);
      font-size: 1.08rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .button,
    button.button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 16px;
      background: var(--panel);
      color: var(--ink);
      font: inherit;
      font-weight: 750;
      text-decoration: none;
      cursor: pointer;
    }

    .button.primary,
    button.button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }

    .button.primary:hover,
    button.button.primary:hover {
      background: var(--primary-strong);
    }

    .panel,
    .plan,
    .static-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }

    .panel {
      padding: 22px;
    }

    .panel dl {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px 16px;
      margin: 0;
    }

    .panel dt {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .panel dd {
      margin: 0;
      font-weight: 750;
    }

    .section {
      padding: 34px 0;
      border-top: 1px solid var(--line);
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .section-head p {
      max-width: 620px;
      margin-bottom: 0;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .plan {
      display: flex;
      min-height: 260px;
      flex-direction: column;
      padding: 20px;
    }

    .price {
      margin: 6px 0 14px;
      font-size: 1.65rem;
      font-weight: 850;
    }

    .plan p {
      color: var(--muted);
    }

    .plan form {
      margin-top: auto;
    }

    .plan .button {
      width: 100%;
    }

    .static-panel {
      max-width: 820px;
      padding: 28px;
    }

    .footer {
      border-top: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
    }

    .footer-inner {
      display: flex;
      min-height: 70px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-size: 0.92rem;
    }

    .footer nav {
      display: flex;
      gap: 14px;
    }

    .footer a {
      text-decoration: none;
    }

    @media (max-width: 780px) {
      .topbar-inner,
      .footer-inner {
        align-items: flex-start;
        flex-direction: column;
        justify-content: center;
        padding: 14px 0;
      }

      .nav {
        width: 100%;
        flex-wrap: wrap;
      }

      .hero,
      .grid {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .footer nav {
        flex-wrap: wrap;
      }
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="site-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/">MoveDefense</a>
        <nav class="nav" aria-label="Public navigation">
          <a href="/#pricing">Pricing</a>
          <a href="/contact/">Contact</a>
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
        </nav>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <footer class="footer">
      <div class="footer-inner">
        <span>MoveDefense operational record tools</span>
        <nav aria-label="Footer navigation">
          <a href="/contact/">Contact</a>
          <a href="/privacy/">Privacy</a>
          <a href="/terms/">Terms</a>
        </nav>
      </div>
    </footer>
  </div>
</body>
</html>
