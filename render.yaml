services:
  - type: web
    name: movedefense
    env: python
    plan: standard
    repo: https://github.com/lbibbs312/owner
    branch: fix/owner-review-security-01
    autoDeploy: true
    # Zero-downtime deploys: Render keeps the current instance serving until the
    # new one answers 200 here, then cuts over. Without this, a deploy restart
    # produced a brief 502 for live users.
    healthCheckPath: /healthz

    buildCommand: pip install -e .
    preDeployCommand: flask --app lacksdrivers.py deploy-db
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --timeout 120 wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: FLASK_ENV
        value: "production"
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ENABLE_SOCKETIO
        value: "false"
      - key: PUBLIC_BASE_URL
        value: "https://movedefense.com"
      - key: CANONICAL_HOST
        value: "movedefense.com"
      - key: CANONICAL_SCHEME
        value: "https"
      - key: ENFORCE_CANONICAL_HOST
        value: "true"
      - key: PUBLIC_CONTACT_EMAIL
        value: "bibbstechnology@gmail.com"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
      # Stripe checkout — set the VALUES in the Render dashboard (never commit secrets).
      # STRIPE_SECRET_KEY is your sk_live_/sk_test_ (or restricted) key; the price IDs
      # come from `flask sync-stripe-catalog`.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_DAILY_ROUTE_PASS
        sync: false
      - key: STRIPE_PRICE_ROUTE_PASS_EXTRA_EXPORT
        sync: false
      - key: STRIPE_PRICE_ROUTE_PASS_EXPORT_PACK
        sync: false
      - key: DRIVER_LOG_PHOTO_UPLOAD_FOLDER
        value: /var/data/movedefense_uploads/driver_log_photos
      - key: DAMAGE_UPLOAD_FOLDER
        value: /var/data/movedefense_uploads/damage_photos
      - key: HOT_PART_UPLOAD_FOLDER
        value: /var/data/movedefense_uploads/hot_part_photos
      - key: IFTA_UPLOAD_FOLDER
        value: /var/data/movedefense_uploads/ifta_receipts

    disk:
      name: movedefense-uploads
      mountPath: /var/data/movedefense_uploads
      sizeGB: 5
