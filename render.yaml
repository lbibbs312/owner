services:
  - type: web
    name: movedefense
    env: python
    plan: standard
    repo: https://github.com/lbibbs312/owner
    branch: claude/review-lacksdrivers-flask-kAOQQ
    autoDeploy: false

    buildCommand: pip install -e .
    preDeployCommand: flask --app lacksdrivers.py deploy-db
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --timeout 120 wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: FLASK_ENV
        value: "production"
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ENABLE_SOCKETIO
        value: "false"
      - key: APP_URL
        value: "https://movedefense.com"
      - key: BASE_URL
        value: "https://movedefense.com"
      - key: PUBLIC_URL
        value: "https://movedefense.com"
      - key: CANONICAL_HOST
        value: "movedefense.com"
      - key: REDIRECT_HOSTS
        value: "lacksdrivers.com,www.lacksdrivers.com"
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
      - key: DRIVER_LOG_PHOTO_UPLOAD_FOLDER
        value: /var/data/movedefense_uploads/driver_log_photos
      - key: DAMAGE_UPLOAD_FOLDER
        value: /var/data/movedefense_uploads/damage_photos
      - key: HOT_PART_UPLOAD_FOLDER
        value: /var/data/movedefense_uploads/hot_part_photos

    disk:
      name: movedefense-uploads
      mountPath: /var/data/movedefense_uploads
      sizeGB: 5
