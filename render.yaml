services:
  - type: web
    name: lacksdrivers-com
    env: python
    plan: free
    branch: main
    autoDeploy: true

    buildCommand: pip install -e .
    startCommand: gunicorn --worker-class eventlet -w 1 wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: SECRET_KEY
        sync: false
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
