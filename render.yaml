services:
  - type: web
    name: movedefense-customer
    env: python
    repo: https://github.com/lbibbs312/owner
    plan: standard
    branch: movedefense-template
    autoDeploy: true

    buildCommand: pip install -e .
    preDeployCommand: flask --app lacksdrivers.py deploy-db
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --timeout 120 wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: FLASK_ENV
        value: "production"
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ENABLE_SOCKETIO
        value: "false"
      - key: APP_URL
        value: "https://movedefense-customer.onrender.com"
      - key: BASE_URL
        value: "https://movedefense-customer.onrender.com"
      - key: PUBLIC_URL
        value: "https://movedefense-customer.onrender.com"
      - key: CANONICAL_HOST
        value: "movedefense-customer.onrender.com"
      - key: SECRET_KEY
        sync: false
      - key: SQLALCHEMY_DATABASE_URI
        fromDatabase:
          name: movedefense-customer-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: movedefense-customer-db
          property: connectionString
      - key: MANAGER_REGISTRATION_PIN
        sync: false
      - key: PASSWORD_RESET_EXPIRATION_MINUTES
        value: "60"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_USE_TLS
        value: "true"


databases:
  - name: movedefense-customer-db
    databaseName: movedefense_customer
    user: movedefense_customer_user
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "18"
