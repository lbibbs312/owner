services:
  - type: web
    name: lacksdrivers-com
    env: python
    plan: free
    branch: main
    autoDeploy: true

    buildCommand: pip install -e .
    preDeployCommand: flask --app lacksdrivers.py deploy-db
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --timeout 120 wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: FLASK_ENV
        value: "production"
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ENABLE_SOCKETIO
        value: "false"
      - key: APP_URL
        value: "https://movedefense.com"
      - key: BASE_URL
        value: "https://movedefense.com"
      - key: PUBLIC_URL
        value: "https://movedefense.com"
      - key: CANONICAL_HOST
        value: "movedefense.com"
      - key: REDIRECT_HOSTS
        value: "lacksdrivers.com,www.lacksdrivers.com"
      - key: SECRET_KEY
        sync: false
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
