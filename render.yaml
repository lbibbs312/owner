services:
  - type: web
    name: movedefense-customer
    env: python
    plan: standard
    branch: movedefense-template
    autoDeploy: true

    buildCommand: pip install -e .
    preDeployCommand: flask --app lacksdrivers.py deploy-db
    startCommand: gunicorn --worker-class gthread --workers 1 --threads 4 --timeout 120 wsgi:application --bind 0.0.0.0:$PORT

    envVars:
      - key: FLASK_ENV
        value: "production"
      - key: FLASK_DEBUG
        value: "false"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: ENABLE_SOCKETIO
        value: "false"
      - key: APP_URL
        value: "https://movedefense-customer.onrender.com"
      - key: BASE_URL
        value: "https://movedefense-customer.onrender.com"
      - key: PUBLIC_URL
        value: "https://movedefense-customer.onrender.com"
      - key: CANONICAL_HOST
        value: "movedefense-customer.onrender.com"
      - key: SECRET_KEY
        sync: false
      - key: SQLALCHEMY_DATABASE_URI
        sync: false
      - key: MANAGER_REGISTRATION_PIN
        sync: false
